<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Defang IOC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 200px;
      max-height: 580px;
      background: #0f172a;
      color: #e2e8f0;
      font: 13px/1.5 system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: #020617;
      flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: 13px; color: #fff; }
    .logo span { color: #22d3ee; }
    .mode-btn {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: #94a3b8;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .mode-btn:hover { background: rgba(255,255,255,.1); color: #e2e8f0; }
    .mode-btn.refang {
      border-color: rgba(251,191,36,.4);
      background: rgba(251,191,36,.1);
      color: #fcd34d;
    }
    .mode-btn.refang:hover { background: rgba(251,191,36,.18); }

    /* ── Input ───────────────────────────────────────────── */
    .input-wrap { padding: 10px 12px 6px; flex-shrink: 0; }
    textarea {
      width: 100%;
      height: 80px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #e2e8f0;
      font: 11px/1.5 monospace;
      padding: 8px 10px;
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: rgba(34,211,238,.4); }
    textarea::placeholder { color: #475569; }

    /* ── Action bar ──────────────────────────────────────── */
    .action-bar {
      display: flex;
      gap: 6px;
      padding: 0 12px 8px;
      flex-shrink: 0;
    }
    .btn-primary {
      flex: 1;
      background: #22d3ee;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, opacity .1s;
    }
    .btn-primary:hover { transform: scale(1.02); }
    .btn-primary:disabled { opacity: .4; cursor: default; transform: none; }
    .btn-secondary {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: #94a3b8;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: #e2e8f0; }

    /* ── Results ─────────────────────────────────────────── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 6px;
      min-height: 0;
    }
    .results::-webkit-scrollbar { width: 3px; }
    .results::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    .empty {
      text-align: center;
      color: #475569;
      font-size: 12px;
      padding: 24px 12px;
      line-height: 1.6;
    }
    .empty small { display: block; font-size: 11px; color: #334155; margin-top: 4px; }

    .ioc-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 8px;
      cursor: default;
    }
    .ioc-row:hover { background: rgba(255,255,255,.04); }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ioc-text { flex: 1; min-width: 0; }
    .ioc-orig {
      font: 11px/1.4 monospace;
      color: #475569;
      text-decoration: line-through;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ioc-val {
      font: 11px/1.4 monospace;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .count-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      color: #f59e0b;
    }

    .copy-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #64748b;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s, background .15s;
    }
    .ioc-row:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: rgba(255,255,255,.1); color: #e2e8f0; }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .footer.visible { display: flex; }
    .stat-chip {
      font-size: 10px;
      color: #64748b;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      padding: 1px 7px;
      border-radius: 9999px;
    }
    .open-link {
      margin-left: auto;
      font-size: 10px;
      color: #22d3ee;
      text-decoration: none;
    }
    .open-link:hover { text-decoration: underline; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: #1e293b;
      border: 1px solid rgba(34,211,238,.2);
      color: #67e8f9;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      opacity: 0;
      transition: all .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">🔬 De<span>fang</span> IOC</span>
    <button class="mode-btn">
      Mode: <span id="mode-lbl">Defang</span>
    </button>
  </div>

  <!-- Input -->
  <div class="input-wrap">
    <textarea id="input"
      placeholder="Paste text with IOCs…&#10;&#10;185.220.101.45 · evil.ru · CVE-2024-21887&#10;attacker@phish.net · https://malware.io/drop"></textarea>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-primary" id="copy-all-btn" disabled>
      Copy all defanged
    </button>
    <button class="btn-secondary">Clear</button>
  </div>

  <!-- Results -->
  <div class="results">
    <div class="empty" id="empty-state">
      Paste text above to extract IOCs
      <small>IPs · Domains · URLs · Hashes · Emails · CVEs</small>
    </div>
    <div id="ioc-list" style="display:none"></div>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer">
    <span class="stat-chip" id="count-chip">0 IOCs</span>
    <a class="open-link" href="https://dgiry.github.io/defang-ioc" target="_blank">
      Open full tool →
    </a>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
